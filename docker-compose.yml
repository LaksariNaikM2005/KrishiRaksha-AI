version: "3.9"

services:
  # ─── PostgreSQL with TimescaleDB ───────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: krishiraksha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: krishiraksha
      POSTGRES_PASSWORD: krishiraksha
      POSTGRES_DB: krishiraksha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishiraksha"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: krishiraksha-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Qdrant (Vector DB) ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: krishiraksha-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: krishiraksha-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Socket Server (Real-time events) ──────────────────────────────────
  socket-server:
    build:
      context: ./backend/socket-server
      dockerfile: Dockerfile
    container_name: krishiraksha-socket
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: 3001
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krishiraksha-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NODE_ENV: development
    depends_on:
      - api
      - socket-server

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishiraksha-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://krishiraksha:krishiraksha@postgres:5432/krishiraksha
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
      SOCKET_SERVER_URL: http://socket-server:3001
    volumes:
      - ./backend:/app
      - model_weights:/app/models/weights
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: krishiraksha-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://krishiraksha:krishiraksha@postgres:5432/krishiraksha
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend:/app
      - model_weights:/app/models/weights
    depends_on:
      - redis
      - postgres
    command: celery -A app.celery_app worker --loglevel=info -Q default,ai_tasks

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  model_weights:

networks:
  default:
    name: krishiraksha-network
