services:
  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krishiraksha-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString
      - key: MINIO_ENDPOINT
        value: minio:9000
      - key: QDRANT_URL
        value: http://qdrant:6333
      - key: SOCKET_SERVER_URL
        fromService:
          type: web
          name: socket-server
          property: host

  # ─── Next.js/Vite Frontend ─────────────────────────────────────────────────────
  - type: web
    name: frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: api
          property: host
      - key: VITE_WS_URL
        fromService:
          type: web
          name: socket-server
          property: host

  # ─── Socket Server ──────────────────────────────────────────────────────────
  - type: web
    name: socket-server
    runtime: node
    buildCommand: cd socket-server && npm install
    startCommand: cd socket-server && node server.js
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString
      - key: PORT
        value: 3001

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: celery-worker
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.celery_app worker --loglevel=info -Q default,ai_tasks
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krishiraksha-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString

# Databases
databases:
  - name: krishiraksha-db
    plan: free

# Cache (Redis)
# Note: Render Redis is a separate service type
